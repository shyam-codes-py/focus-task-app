<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tasks - Ultimate V3</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <nav class="portfolio-nav">
        <div class="nav-logo">Focus<span>.app</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">Dashboard</a></li>
            <li><button id="installBtn" class="nav-install-btn">📱 Install</button></li>
        </ul>
    </nav>

    <div class="app-wrapper">
        <header class="header">
            <h1 class="neon-heading">Focus Tasks</h1>
            <p class="subtitle">Drag, Drop & Conquer Your Day</p>
        </header>

        <div class="input-section expanded-input">
            <input type="text" id="taskInput" placeholder="What's your next mission?..." autocomplete="off">
            
            <div class="filter-group">
                <select id="taskCategory" class="glass-input">
                    <option value="Coding">💻 Coding</option>
                    <option value="Personal">🏠 Personal</option>
                    <option value="Urgent">🚨 Urgent</option>
                </select>
                
                <select id="taskPriority" class="glass-input">
                    <option value="Low">🟢 Low</option>
                    <option value="Medium">🟡 Mid</option>
                    <option value="High">🔴 High</option>
                </select>
                
                <input type="datetime-local" id="taskDueDate" class="glass-input">
                
                <button id="addTaskBtn" class="neo-btn">+</button>
            </div>
        </div>

        <div class="boards-container">
            <div class="board" id="pendingBoard">
                <div class="board-header">
                    <h2 class="board-title">Active Missions</h2>
                </div>
                <ul id="pendingList" class="task-list"></ul>
            </div>

            <div class="board" id="completedBoard">
                <div class="board-header">
                    <h2 class="board-title">Completed</h2>
                    <button class="clear-btn" onclick="clearCompleted()">🧹 Clear All</button>
                </div>
                <ul id="completedList" class="task-list"></ul>
            </div>
        </div>
    </div>

    <footer class="portfolio-footer">
        <p>&copy; 2026 Focus Tasks. Built for high performance.</p>
        <div class="footer-links">
            <a href="https://yourportfolio.link" target="_blank" class="portfolio-link">🌐 More from me</a>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
