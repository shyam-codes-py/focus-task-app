<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tasks - Premium PWA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <nav class="portfolio-nav">
        <div class="nav-logo">Focus<span>.app</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active">Dashboard</a></li>
            <li><button id="installBtn" class="nav-install-btn">📱 Install</button></li>
        </ul>
    </nav>

    <div class="app-wrapper">
        <header class="header">
            <h1 class="neon-heading">Focus Tasks</h1>
            <p class="subtitle">Manage your daily grind with style</p>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What's your next mission?..." autocomplete="off">
            <button id="addTaskBtn" class="neo-btn">+</button>
        </div>

        <div class="boards-container">
            <div class="board">
                <div class="board-header">
                    <h2 class="board-title">Active Missions</h2>
                </div>
                <ul id="pendingList" class="task-list"></ul>
            </div>

            <div class="board">
                <div class="board-header">
                    <h2 class="board-title">Completed</h2>
                    <button class="clear-btn" onclick="clearCompleted()">🧹 Clear All</button>
                </div>
                <ul id="completedList" class="task-list"></ul>
            </div>
        </div>
    </div>

    <footer class="portfolio-footer">
        <p>&copy; 2026 Focus Tasks. Built for high performance.</p>
        <div class="footer-links">
            <a href="https://yourportfolio.link" target="_blank" class="portfolio-link">🌐 More from me</a>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Active!'))
                .catch((err) => console.log('SW Registration failed', err));
        }
    </script>
</body>
</html>
